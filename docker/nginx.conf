# Reverse proxy Nginx pour ImmoGérer.
upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Taille max des uploads (photos de biens)
    client_max_body_size 20M;

    # Fichiers statiques (admin Django, Swagger UI, CSS/JS)
    location /static/ {
        alias /app/staticfiles/;
        access_log off;
        expires 7d;
    }

    # Fichiers médias (photos uploadées)
    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    # Tout le reste → application Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
