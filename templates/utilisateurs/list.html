{% extends "base.html" %}

{% block title %}Utilisateurs — Immobilier{% endblock %}

{% block content %}
  <div class="card p-4">
    <h1>{{ title }}</h1>
    <div class="list-group">
      {% for u in users %}
        <a href="/utilisateurs/{{ u.id }}/" class="list-group-item list-group-item-action">
          <div class="d-flex w-100 justify-content-between">
            <h5 class="mb-1">{{ u.get_full_name }}</h5>
            <small>{{ u.role }}</small>
          </div>
          <small>{{ u.email }}</small>
        </a>
      {% empty %}
        <div class="alert alert-info">Aucun utilisateur trouvé.</div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
