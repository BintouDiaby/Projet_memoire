{% extends "base.html" %}

{% block title %}{{ user.get_full_name }} — Immobilier{% endblock %}

{% block content %}
  <div class="card p-4">
    <h1>{{ user.get_full_name }}</h1>
    <p><strong>Email:</strong> {{ user.email }}</p>
    <p><strong>Rôle:</strong> {{ user.role }}</p>
    <p><a class="btn btn-secondary" href="/utilisateurs/">Retour à la liste</a></p>
  </div>
{% endblock %}
