<div class="card p-3">
  <h4>👋 Bienvenue — Découvrir des logements</h4>
  <p class="text-muted">Nous avons sélectionné quelques offres pour vous aider à démarrer.</p>
  <div class="row mt-3">
    {% for b in locataire_recommandations %}
      <div class="col-md-3 mb-3">
        <div class="card p-2 h-100">
          <div class="fw-bold">{{ b.titre }}</div>
          <div class="small text-muted">{{ b.ville }}</div>
          <div class="mt-2">{{ b.prix_mensuel|floatformat:0 }} FCFA/mois</div>
        </div>
      </div>
    {% endfor %}
  </div>
  <div class="mt-3"><a href="/biens/" class="btn btn-primary">Explorer les offres</a></div>
</div>
